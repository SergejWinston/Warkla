name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

concurrency:
  group: frontend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint & Build Frontend
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Lint with ESLint
      run: |
        cd frontend
        if node -e "const p=require('./package.json');process.exit(p?.scripts?.lint ? 0 : 1)"; then
          npm run lint
        else
          echo "ESLint script not configured, skipping lint."
        fi

    - name: Build
      run: cd frontend && npm run build

    - name: Check build artifacts
      run: |
        if [ -d frontend/dist ]; then
          echo "✅ Build successful"
          du -sh frontend/dist
        else
          echo "❌ Build failed - no dist folder"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/
        retention-days: 1

  deploy-frontend:
    needs: lint-and-build
    runs-on: ubuntu-latest
    name: Deploy Frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist/

    - name: Check deploy configuration
      id: deploy-config
      env:
        SSH_KEY: ${{ secrets.SSH_KEY || secrets.DEPLOY_KEY }}
        SSH_HOST: ${{ secrets.SSH_HOST || secrets.DEPLOY_HOST }}
        SSH_USER: ${{ secrets.SSH_USER || secrets.DEPLOY_USER }}
        SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/opt/warkla' }}
      run: |
        missing=0
        for var in SSH_KEY SSH_HOST SSH_USER DEPLOY_PATH; do
          if [ -z "${!var}" ]; then
            echo "Missing secret: $var"
            missing=1
          fi
        done

        if [ "$missing" -eq 0 ]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Deploy configuration is complete."
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "Deploy will be skipped because required secrets are missing."
        fi

    - name: Deploy to server
      if: steps.deploy-config.outputs.ready == 'true'
      env:
        SSH_KEY: ${{ secrets.SSH_KEY || secrets.DEPLOY_KEY }}
        SSH_HOST: ${{ secrets.SSH_HOST || secrets.DEPLOY_HOST }}
        SSH_USER: ${{ secrets.SSH_USER || secrets.DEPLOY_USER }}
        SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || vars.DEPLOY_PATH || '/opt/warkla' }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

        ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" \
          "mkdir -p ${DEPLOY_PATH}/frontend/dist"

        # Deploy frontend to web server
        rsync -avz --delete \
          -e "ssh -p $SSH_PORT -i ~/.ssh/deploy_key" \
          frontend/dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/frontend/dist/"

        # Restart web server if needed
        ssh -p "$SSH_PORT" -i ~/.ssh/deploy_key "${SSH_USER}@${SSH_HOST}" \
          "systemctl restart nginx || echo 'Nginx not configured'"

    - name: Deployment skipped
      if: steps.deploy-config.outputs.ready != 'true'
      run: echo "Skipping frontend deployment because SSH_* (or fallback DEPLOY_*) secrets are not configured."

    - name: Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Frontend deployed successfully!"
        else
          echo "❌ Frontend deployment failed!"
        fi
