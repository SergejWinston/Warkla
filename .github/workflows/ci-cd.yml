name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'services/**'
      - 'migrations/**'
      - 'tests/**'
      - 'test_*.py'
      - 'requirements.txt'
      - 'run.py'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'services/**'
      - 'migrations/**'
      - 'tests/**'
      - 'test_*.py'
      - 'requirements.txt'
      - 'run.py'
      - 'docker-compose.yml'
      - 'Dockerfile'
      - '.github/workflows/ci-cd.yml'
  workflow_dispatch:

concurrency:
  group: backend-ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test Backend
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run tests
      env:
        FLASK_ENV: testing
        JWT_SECRET_KEY: test-secret-key
      run: |
        if find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
          pytest -v --cov=app --cov-report=xml
        else
          echo "No tests found, skipping."
        fi

  build-frontend:
    runs-on: ubuntu-latest
    name: Build Frontend
    permissions:
      contents: read
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install dependencies
      run: cd frontend && npm ci

    - name: Build
      run: cd frontend && npm run build

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/

  deploy:
    needs: [lint-and-test, build-frontend]
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      deployed: ${{ steps.deploy-config.outputs.ready }}
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Download frontend artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: frontend/dist/

    - name: Check deploy configuration
      id: deploy-config
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        missing=0
        for var in DEPLOY_KEY DEPLOY_HOST DEPLOY_USER DEPLOY_PATH; do
          if [ -z "${!var}" ]; then
            echo "Missing secret: $var"
            missing=1
          fi
        done

        if [ "$missing" -eq 0 ]; then
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "Deploy configuration is complete."
        else
          echo "ready=false" >> "$GITHUB_OUTPUT"
          echo "Deploy will be skipped because required secrets are missing."
        fi

    - name: Deploy to server
      if: steps.deploy-config.outputs.ready == 'true'
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      run: |
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

        rsync -avz --delete \
          -e "ssh -i ~/.ssh/deploy_key" \
          --exclude='.git' \
          --exclude='venv' \
          --exclude='node_modules' \
          --exclude='.env' \
          --exclude='__pycache__' \
          --exclude='*.db' \
          ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

        ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" \
          "cd ${DEPLOY_PATH} && \
          python -m venv venv && \
          source venv/bin/activate && \
          pip install --upgrade pip && \
          pip install -r requirements.txt && \
          systemctl restart ege-bot"

    - name: Deployment skipped
      if: steps.deploy-config.outputs.ready != 'true'
      run: echo "Skipping deployment because DEPLOY_* secrets are not configured."

  notify:
    needs: [deploy]
    runs-on: ubuntu-latest
    name: Notify Deployment
    if: always()

    steps:
    - name: Deployment Status
      run: |
        if [ "${{ needs.deploy.result }}" == "success" ] && [ "${{ needs.deploy.outputs.deployed }}" == "true" ]; then
          echo "✅ EGE-Bot deployment successful!"
        elif [ "${{ needs.deploy.outputs.deployed }}" != "true" ]; then
          echo "⏭️ EGE-Bot deployment skipped: DEPLOY_* secrets are missing."
        else
          echo "❌ EGE-Bot deployment failed!"
        fi
