<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Warkla - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="scene"></div>
  <header class="topbar">
    <div class="brand">
      <div class="pixel-cat" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <h1>Warkla</h1>
    </div>
    <div class="topbar-controls">
      <label class="lang-select-wrap" data-i18n="lang_label">Language</label>
      <select class="lang-select" data-lang-select>
        <option value="en">EN</option>
        <option value="ru">RU</option>
      </select>
    </div>
  </header>

  <main class="layout auth-layout">
    <section class="card auth-card">
      <h2 data-i18n="login_title">Login</h2>
      <p class="sub" data-i18n="login_sub">Welcome back to your budget world.</p>
      <form id="authForm" data-mode="login">
        <div class="row">
          <label for="email" data-i18n="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="row">
          <label for="password" data-i18n="password">Password</label>
          <input id="password" type="password" minlength="6" required />
        </div>
        <button class="primary" type="submit" data-i18n="sign_in">Sign in</button>
      </form>
      <p id="authMsg" class="msg"></p>
      <p class="sub auth-switch"><span data-i18n="no_account">No account yet?</span> <a href="/register" data-i18n="create_here">Create one here</a>.</p>
    </section>
  </main>

  <script src="/i18n.js" defer></script>
  <script src="/auth.js" defer></script>
</body>
</html>
